name: Ecosystem

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  rainbowkit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - run: nix develop --command bash -c "pnpm dlx @playwright/test install --with-deps chromium && pnpm dlx @playwright/test test"
        working-directory: examples/ecosystem/rainbowkit

  connectkit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - run: nix develop --command bash -c "pnpm dlx @playwright/test install --with-deps chromium && pnpm dlx @playwright/test test"
        working-directory: examples/ecosystem/connectkit
